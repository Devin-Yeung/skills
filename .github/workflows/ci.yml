name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  devenv-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Install devenv.sh
        run: nix profile add github:cachix/devenv/v2.0.6 -L --accept-flake-config

      - name: Devenv test
        run: devenv test
